[build]
builder = "nixpacks"

[[services]]
name = "seeroth-api"
source = "seeroth-api"

[services.deploy]
startCommand = "java -jar target/seeroth-api-1.0.0-SNAPSHOT.jar"
healthcheckPath = "/api/actuator/health"
healthcheckTimeout = 30

[[services]]
name = "seeroth-ai"
source = "seeroth-ai"

[services.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
