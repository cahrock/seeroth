name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  web:
    name: Angular Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seeroth-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: seeroth-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --watch=false
      - run: npm run build -- --configuration production

  api:
    name: Spring Boot Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seeroth-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - run: ./mvnw verify

  ai:
    name: FastAPI Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seeroth-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest tests/unit/ -v
