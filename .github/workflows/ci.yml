name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Angular ────────────────────────────────────────────
  web:
    name: Angular Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seeroth-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: seeroth-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build (production)
        run: npm run build -- --configuration production

  # ── Spring Boot ────────────────────────────────────────
  api:
    name: Spring Boot Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seeroth-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build & test
        run: ./mvnw verify -Dspring.profiles.active=test
        env:
          JWT_SECRET: ci-test-secret-minimum-256-bits-placeholder
          REDIS_URL: redis://localhost:6379/0

  # ── FastAPI ────────────────────────────────────────────
  ai:
    name: FastAPI Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seeroth-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest tests/unit/ -v
        env:
          APP_ENV: test
          ANTHROPIC_API_KEY: test-key
