spring:
  application:
    name: seeroth-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/seeroth_db}
    username: ${DATABASE_USER:seeroth}
    password: ${DATABASE_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379/0}

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    user:
      name: actuator
      password: ${ACTUATOR_PASSWORD:changeme}

server:
  port: ${APP_PORT_API:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

seeroth:
  jwt:
    secret: ${JWT_SECRET:changeme-replace-in-production-min-256-bits}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
